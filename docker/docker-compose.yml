version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS (POSTGRESQL)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: auth-optrax-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auth_optrax}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - optrax-network

  # ==========================================
  # SERVIDOR DE IDENTIDAD (KEYCLOAK)
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: auth-optrax-keycloak
    command: start --import-realm
    env_file:
      - ../.env
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME: "auth.optrax.io"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_DB: "postgres"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      # Si se desea importar un Realm pre-configurado de prueba
      - ./keycloak-realm-export.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - optrax-network

  # ==========================================
  # APLICACIÓN NODE/EXPRESS + REACT (APP)
  # ==========================================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auth-optrax-app
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - optrax-network

  # ==========================================
  # PROXY REVERSO (NGINX)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: auth-optrax-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - optrax-network

  # ==========================================
  # CLIENTE CERTBOT (LET'S ENCRYPT SSL)
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: auth-optrax-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - optrax-network

volumes:
  pgdata:
    driver: local

networks:
  optrax-network:
    driver: bridge
