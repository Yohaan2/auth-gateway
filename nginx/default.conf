server {
    listen 80;
    server_name auth.optrax.io;

    # Reto de Let's Encrypt para validación de dominio (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirección global a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name auth.optrax.io;

    # Certificados SSL de Let's Encrypt (creados por Certbot)
    ssl_certificate /etc/letsencrypt/live/auth.optrax.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.optrax.io/privkey.pem;

    # Configuraciones SSL estándar de seguridad
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Tamaño máximo de subida de archivos
    client_max_body_size 10M;

    # Redireccionar todo el tráfico al backend de Express (que sirve la app y el frontend)
    location / {
        proxy_pass http://app:3000;
        
        # Headers estándar para propagar IP real y esquema
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Soporte para WebSockets (requerido para HMR de Vite en desarrollo)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Tiempos de espera para conexiones persistentes de WebSocket
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirección hacia Keycloak expuesta por el proxy
    location /auth/ {
        proxy_pass http://keycloak:8080/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
