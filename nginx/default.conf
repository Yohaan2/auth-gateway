server {
    listen 80;
    server_name localhost;

    # Tamaño máximo de subida de archivos
    client_max_body_size 10M;

    # Redireccionar todo el tráfico al backend de Express (que sirve la app y el frontend)
    location / {
        proxy_pass http://app:3000;
        
        # Headers estándar para propagar IP real y esquema
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Soporte para WebSockets (requerido para HMR de Vite en desarrollo)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Tiempos de espera para conexiones persistentes de WebSocket
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirección opcional hacia Keycloak si se quiere acceder a través del mismo puerto proxy
    # Útil para evitar problemas de CORS/cookies del navegador (Single-Origin o similar)
    location /auth/ {
        # Se asume que Keycloak se expone en el path / de su contenedor
        # pero para que funcione con /auth/ se puede mapear o redirigir
        proxy_pass http://keycloak:8080/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
